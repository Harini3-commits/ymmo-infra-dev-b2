<!-- home.html -->
<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Ymmo — Accueil</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- (optionnel) mêmes polices que le dashboard -->
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    * { box-sizing:border-box; margin:0; padding:0; }

    body {
      font-family: Inter, system-ui, sans-serif;
      margin:0;
      min-height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      /* Image de fond locale */
      background-image:url("bg-agence.jpg");
      background-size:cover;
      background-position:center;
      background-repeat:no-repeat;
    }

    /* Légère surcouche pour que le texte reste lisible */
    .overlay {
      position:fixed;
      inset:0;
      background:rgba(15,23,42,0.45);
    }

    .wrap {
      position:relative;
      z-index:1;
      text-align:center;
      padding:24px;
      border-radius:18px;
      background:#ffffffee; /* blanc légèrement transparent */
      box-shadow:0 18px 45px rgba(31,41,51,.3);
      max-width:420px;
    }

    h1 {
      font-family:"DM Serif Display", serif;
      margin-bottom:8px;
    }

    p {
      color:#6B7280;
      font-size:.9rem;
      margin-bottom:18px;
    }

    button {
      border-radius:999px;
      padding:10px 18px;
      border:none;
      background:linear-gradient(135deg,#D3B57A,#C49859);
      color:#2B2215;
      font-weight:600;
      cursor:pointer;
    }

    button:hover {
      transform:translateY(-1px);
      box-shadow:0 14px 30px rgba(152,119,63,0.35);
    }
  </style>
</head>
<body>
  <div class="overlay"></div>
  <div class="wrap">
    <h1>Ymmo • Portefeuille</h1>
    <p>Accédez à votre interface de suivi des biens, transactions et carte interactive.</p>
    <button onclick="window.location.href='index.html'">
      Entrer dans le portefeuille
    </button>
  </div>
</body>
</html>
